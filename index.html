<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Законодательная база</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="controls-container">
        <div class="search-row">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Поиск по статье, описанию или тегам..."
                autocomplete="off"
            >

            <button 
                type="button" 
                id="viewToggle" 
                class="view-toggle" 
                aria-pressed="false"
                title="Переключить компактный режим"
            >
                <span class="view-toggle-icon" aria-hidden="true"></span>
                <span class="view-toggle-text">Компактно</span>
            </button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-code="uk">УК</button>
            <button class="tab-btn" data-code="ak">АК</button>
            <button class="tab-btn" data-code="dk">ДК</button>
        </div>
    </div>

    <div id="articlesContainer">
        <div class="loader">Загрузка базы данных...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
