<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Законодательная база | Portland</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="controls-container">
        <input type="text" id="searchInput" placeholder="Опишите ситуацию, введите фразу или номер...">
        <div class="controls-row">
            <div class="tabs">
                <button class="tab-btn active" data-code="uk">Уголовный кодекс</button>
                <button class="tab-btn" data-code="ak">Административный кодекс</button> 
                <button class="tab-btn" data-code="dk">Дорожный кодекс</button>
                <button class="tab-btn" data-code="pk">Процессуальный кодекс</button>
            </div>
            <div class="mode-toggle" role="group" aria-label="Переключение режима отображения статей">
                <button class="mode-btn active" data-mode="compact" title="Компактный — только часто используемые статьи" aria-pressed="true">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="9,1.8 10.7,6.65 15.85,6.78 11.76,9.9 13.23,14.82 9,11.9 4.77,14.82 6.24,9.9 2.15,6.78 7.3,6.65" fill="currentColor"/>
                    </svg>
                </button>
                <button class="mode-btn" data-mode="full" title="Полный — все статьи, включая редкие" aria-pressed="false">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="4.2,6 4.91,8.03 7.05,8.07 5.34,9.37 5.96,11.43 4.2,10.2 2.44,11.43 3.06,9.37 1.35,8.07 3.49,8.03" fill="currentColor"/>
                        <polygon points="9,5.4 9.85,7.83 12.42,7.89 10.38,9.45 11.12,11.91 9,10.45 6.88,11.91 7.62,9.45 5.58,7.89 8.15,7.83" fill="currentColor"/>
                        <polygon points="13.8,6 14.51,8.03 16.65,8.07 14.94,9.37 15.56,11.43 13.8,10.2 12.04,11.43 12.66,9.37 10.95,8.07 13.09,8.03" fill="currentColor"/>
                    </svg>
                </button>
            </div>
            <div class="view-toggle" role="group" aria-label="Переключение вида отображения">
                <button class="view-btn active" data-view="grid" title="Плитки" aria-pressed="true">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1" y="1" width="7" height="7" rx="1.5" fill="currentColor"/>
                        <rect x="10" y="1" width="7" height="7" rx="1.5" fill="currentColor"/>
                        <rect x="1" y="10" width="7" height="7" rx="1.5" fill="currentColor"/>
                        <rect x="10" y="10" width="7" height="7" rx="1.5" fill="currentColor"/>
                    </svg>
                </button>
                <button class="view-btn" data-view="list" title="Список" aria-pressed="false">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1" y="2" width="16" height="3.5" rx="1.2" fill="currentColor"/>
                        <rect x="1" y="7.25" width="16" height="3.5" rx="1.2" fill="currentColor"/>
                        <rect x="1" y="12.5" width="16" height="3.5" rx="1.2" fill="currentColor"/>
                    </svg>
                </button>
            </div>
            <div class="settings-wrapper">
                <button class="settings-btn" id="settingsBtn" title="Настройки" aria-haspopup="true" aria-expanded="false">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" fill="currentColor"/>
                    </svg>
                </button>
                <div class="settings-panel" id="settingsPanel">
                    <span class="settings-label">Масштаб</span>
                    <div class="zoom-control">
                        <button class="zoom-step-btn" id="zoomMinusBtn" title="Уменьшить" aria-label="Уменьшить масштаб">−</button>
                        <span class="zoom-value" id="zoomValue">100%</span>
                        <button class="zoom-step-btn" id="zoomPlusBtn" title="Увеличить" aria-label="Увеличить масштаб">+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="articlesContainer"><div class="loader">Синхронизация данных...</div></div>

    <script src="script.js"></script>
</body>
</html>
