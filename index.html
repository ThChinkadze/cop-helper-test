<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Законодательная база | Portland</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="controls-container">
        <input type="text" id="searchInput" placeholder="Опишите ситуацию, введите фразу или номер...">
        <div class="controls-row">
            <div class="tabs">
                <button class="tab-btn active" data-code="uk">Уголовный кодекс</button>
                <button class="tab-btn" data-code="ak">Административный кодекс</button> 
                <button class="tab-btn" data-code="dk">Дорожный кодекс</button>
            </div>
            <div class="view-toggle" role="group" aria-label="Переключение вида отображения">
                <button class="view-btn active" data-view="grid" title="Плитки" aria-pressed="true">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1" y="1" width="7" height="7" rx="1.5" fill="currentColor"/>
                        <rect x="10" y="1" width="7" height="7" rx="1.5" fill="currentColor"/>
                        <rect x="1" y="10" width="7" height="7" rx="1.5" fill="currentColor"/>
                        <rect x="10" y="10" width="7" height="7" rx="1.5" fill="currentColor"/>
                    </svg>
                </button>
                <button class="view-btn" data-view="list" title="Список" aria-pressed="false">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1" y="2" width="16" height="3.5" rx="1.2" fill="currentColor"/>
                        <rect x="1" y="7.25" width="16" height="3.5" rx="1.2" fill="currentColor"/>
                        <rect x="1" y="12.5" width="16" height="3.5" rx="1.2" fill="currentColor"/>
                    </svg>
                </button>
            </div>
            <a href="https://www.donationalerts.com/r/rewerston" target="_blank" rel="noopener noreferrer" class="support-btn" title="Поддержать автора">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor"/>
                </svg>
                <span class="support-btn-text">Поддержать</span>
            </a>
        </div>
    </div>

    <div id="articlesContainer"><div class="loader">Синхронизация данных...</div></div>

    <script src="script.js"></script>
</body>
</html>
